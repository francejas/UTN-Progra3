# ==========================================
# 1. CONEXIÓN A LA BASE DE DATOS
# ==========================================
# Mantener el createDatabaseIfNotExist por seguridad
spring.datasource.url=jdbc:mysql://localhost:3306/liga_pokemon?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=admin
# (Acordate de dejar la contraseña vacía "" si en tu XAMPP/Workbench usás el root por defecto sin clave)

# ==========================================
# 2. CONFIGURACIÓN DE JPA / HIBERNATE
# ==========================================
# Usamos "update" para que Hibernate se conecte, lea lo que creaste en Workbench y no te borre nada
spring.jpa.hibernate.ddl-auto=update

# Te muestra en la consola el SQL real que se está ejecutando
spring.jpa.show-sql=true

# ==========================================
# 3. ELIMINAR INICIALIZACIÓN POR DATA.SQL
# ==========================================
# Como ya corrés los INSERTS a mano en Workbench, desactivamos la inicialización diferida
# para evitar conflictos de IDs duplicados o bloqueos al levantar la app.
spring.jpa.defer-datasource-initialization=falseialization=false